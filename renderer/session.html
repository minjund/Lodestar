<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lodestar Session</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="session-window-page">
  <div class="session-shell">
    <header class="session-top">
      <div class="session-window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="session-heading">
        <div class="session-kicker">Claude Session Console</div>
        <h1 id="sessionTitle">작업 세션</h1>
        <p id="sessionSub"></p>
      </div>
      <div class="session-actions">
        <span id="sessionState" class="session-state idle">대기</span>
        <button id="stopBtn" class="btn btn-ghost hidden">대화 중단</button>
      </div>
    </header>

    <main class="session-layout">
      <section class="session-workbench">
        <div id="note" class="task-note session-note"></div>
        <div id="questions" class="drawer-questions hidden"></div>

        <section id="runPanel" class="runpanel session-run">
          <div id="activityStrip" class="activity-strip idle" aria-live="polite">
            <span class="activity-spinner" aria-hidden="true"></span>
            <span class="activity-copy">
              <b id="activityLabel">대기</b>
              <small id="activityDetail">메시지를 보내면 Claude 세션이 시작됩니다.</small>
            </span>
            <button id="stopInlineBtn" class="btn btn-danger hidden" type="button">중단</button>
          </div>
          <div id="status" class="run-status">실행 준비</div>
          <div id="output" class="md-output session-output"></div>
          <div class="session-composer">
            <label id="promptLabel" class="fld-label hidden" for="prompt">메시지</label>
            <textarea id="prompt" class="fld session-prompt" rows="3" placeholder="메시지를 입력하세요. Enter로 보냅니다. Shift+Tab은 줄바꿈입니다."></textarea>
            <div id="commandSuggest" class="skill-suggest hidden"></div>
            <div class="session-composer-actions">
              <span class="session-send-hint">Enter 전송 · Shift+Tab 줄바꿈</span>
              <button id="runBtn" class="btn btn-primary">보내기 ↵</button>
            </div>
          </div>
          <div id="replyRow" class="reply-row hidden" aria-hidden="true">
            <textarea id="reply" class="fld" rows="3" placeholder="이 세션에 이어서 보낼 메시지를 입력하세요. Enter로 보냅니다."></textarea>
            <div id="replySuggest" class="skill-suggest hidden"></div>
            <div class="reply-btns">
              <button id="replyBtn" class="btn btn-primary">보내기 ↵</button>
            </div>
          </div>
        </section>
      </section>

      <aside class="session-side">
        <section class="session-card">
          <h2>컨텍스트</h2>
          <dl class="session-facts">
            <div><dt>프로젝트</dt><dd id="factProject"></dd></div>
            <div><dt>브랜치</dt><dd id="factBranch"></dd></div>
            <div><dt>범위</dt><dd id="factLane"></dd></div>
            <div><dt>Claude</dt><dd id="factClaude"></dd></div>
            <div><dt>작업 상태</dt><dd id="factTask"></dd></div>
            <div><dt>세션 로그</dt><dd id="factLog"></dd></div>
            <div><dt>남은 사용량</dt><dd id="factQuota" class="session-quota-gauges"></dd></div>
          </dl>
        </section>
        <section id="history" class="task-history hidden"></section>
        <section id="contextHelp" class="session-card">
          <h2>컨텍스트 규칙</h2>
          <p>일반 답변은 같은 Claude 세션 ID로 이어지고, <code>/wcc-*</code> 명령은 새 컨텍스트로 시작합니다.</p>
        </section>
      </aside>
    </main>
  </div>
  <script src="./session.js"></script>
</body>
</html>
