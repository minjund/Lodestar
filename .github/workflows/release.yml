name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@latest
      - run: npm ci
      - run: npm test
      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const expected=process.env.RELEASE_TAG.replace(/^v/,'');const actual=require('./package.json').version;if(actual!==expected){throw new Error('package version '+actual+' does not match release '+expected)}"
      - name: Check whether npm version already exists
        id: npm_version
        shell: bash
        run: |
          package="$(node -p "const value=require('./package.json'); value.name+'@'+value.version")"
          if npm view "$package" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Keep the existing npm release
        if: steps.npm_version.outputs.published == 'true'
        run: echo "This version is already available on npm; desktop builds will continue."
      - name: Publish npm package
        id: publish_npm
        if: steps.npm_version.outputs.published != 'true'
        continue-on-error: true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Report skipped npm publication
        if: steps.publish_npm.outcome == 'failure'
        run: echo "::warning::npm publication failed; desktop release creation will continue."

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            command: npm run dist:mac
            artifact: LoadToAgent-macOS
            files: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            command: npm run dist:win
            artifact: LoadToAgent-Windows
            files: release/*.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  attach-desktop-files:
    needs: [publish-npm, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: LoadToAgent-*
          path: release-assets
          merge-multiple: true
      - name: Create GitHub Release and attach files
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release-assets/* --verify-tag --generate-notes --title "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
          fi
